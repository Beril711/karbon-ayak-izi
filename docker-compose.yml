version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: greencampus_db
    environment:
      POSTGRES_DB: greencampus
      POSTGRES_USER: gcuser
      POSTGRES_PASSWORD: gcpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcuser -d greencampus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: greencampus_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greencampus_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://gcuser:gcpassword@db:5432/greencampus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greencampus_celery
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://gcuser:gcpassword@db:5432/greencampus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greencampus_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://gcuser:gcpassword@db:5432/greencampus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery

volumes:
  postgres_data:
